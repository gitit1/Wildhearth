<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Wildhearth</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#20170d;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    canvas{display:block;touch-action:none}
    /* Window system: everything on screen is a window on a desktop surface
       (see src/ui/windows/*). #gameArea IS the game viewport window's body — it
       fills its .wh-body host (absolute inset:0), and the canvas fills it. */
    #gameArea{position:absolute;inset:0;overflow:hidden}
    #cv{position:absolute;inset:0;width:100%;height:100%}
    .pill{background:rgba(25,32,18,.85);color:#f0ead6;padding:7px 14px;border-radius:12px;font-size:15px;font-weight:700}
    #calendar{font-size:13px;white-space:nowrap}
    #weather{font-size:13px;white-space:nowrap}
    #prompt{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);background:rgba(25,32,18,.9);
      color:#ffd54f;padding:8px 16px;border-radius:12px;font-size:15px;font-weight:700;display:none;z-index:5}
    #toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(46,90,38,.95);
      color:#fff;padding:8px 18px;border-radius:12px;font-size:15px;font-weight:700;display:none;z-index:6}
    #actBtn{position:absolute;bottom:18px;left:18px;width:64px;height:64px;border-radius:50%;border:none;
      background:rgba(230,190,80,.9);font-size:26px;z-index:6;cursor:pointer;
      display:flex;align-items:center;justify-content:center}
    #zoomBtns{position:absolute;right:12px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:6}
    .zoom-btn{width:40px;height:40px;border-radius:12px;border:2px solid #7a5c34;cursor:pointer;
      background:rgba(25,32,18,.85);color:#f0ead6;font-size:22px;font-weight:700;line-height:1;
      display:flex;align-items:center;justify-content:center;padding:0}
    /* the icon dock (viewport tool row) is now a window body; it lays out as a
       flex row, or a column when the dock's ⇄ orientation toggle flips it. */
    #tools{display:flex;flex-direction:row;flex-wrap:nowrap;justify-content:center;gap:8px;
      align-items:center}
    #tools.wh-dock-vertical{flex-direction:column}
    .tool-btn{width:52px;height:52px;border-radius:14px;border:2px solid #7a5c34;cursor:pointer;
      background:rgba(25,32,18,.85);color:#f0ead6;font-size:24px;line-height:1;
      display:flex;align-items:center;justify-content:center;padding:0}
    .tool-btn.active{background:rgba(230,190,80,.9);border-color:#b8912f}
    /* R8/B6: active-quest count badge on the quest dock icon */
    #questBtn{position:relative;overflow:visible}
    .tool-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:10px;
      background:#c94f3a;color:#fff;font-size:11px;font-weight:800;line-height:18px;text-align:center;
      padding:0 4px;border:2px solid #2b2313;box-shadow:0 2px 5px rgba(0,0,0,.5);pointer-events:none}
    /* Windows migration I: backpack/skills/minimap/memory book/shop/gift are
       real wm windows now (src/ui/backpack.ts etc. + src/ui/windows/
       scalewindow.ts) — chrome (background/border/shadow/position/z-index/
       show-hide) lives entirely in .wh-window; these ids are plain content,
       `display:inline-block` so they shrink-to-fit their own grid/list (both
       while briefly still in their original DOM spot at boot, measured for
       the window's natural size, and once reparented into a resizable
       window's body — matching the old fixed-position panels' sizing). */
    #backpack{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(12px*var(--s))}
    #minimapBox{position:relative;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
    #minimap{border-radius:8px;cursor:pointer}
    /* Fast-travel confirm (v2 block #4): a small parchment card over the map when
       a discovered pin is clicked. Hidden until a pin is picked. */
    #travelConfirm{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      min-width:170px;max-width:82%;padding:10px 12px 11px;border-radius:9px;z-index:5;
      background:linear-gradient(#f3e4c3,#e6d0a4);color:#3a2c17;border:2px solid #7a5a30;
      box-shadow:0 6px 18px rgba(0,0,0,.5);text-align:center;font-size:13px;display:none}
    #travelConfirm.show{display:block}
    #travelConfirm .tc-title{font-weight:800;margin-bottom:2px}
    #travelConfirm .tc-fare{font-size:12px;opacity:.9;margin-bottom:9px}
    #travelConfirm .tc-fare b{color:#8a5a1e}
    #travelConfirm .tc-btns{display:flex;gap:8px;justify-content:center}
    #travelConfirm button{font:inherit;font-weight:800;cursor:pointer;border-radius:7px;
      padding:5px 12px;border:2px solid #5c421f}
    #travelConfirm .tc-go{background:#7bb04f;color:#20340f;border-color:#4c6b2b}
    #travelConfirm .tc-no{background:#e9dcc0;color:#4a3820}
    #travelConfirm.blocked .tc-fare{color:#9c3d34}
    #backpackGrid{display:grid;grid-template-columns:repeat(4,calc(52px*var(--s)));gap:calc(8px*var(--s))}
    .bp-slot{position:relative;width:calc(52px*var(--s));height:calc(52px*var(--s));border-radius:8px;
      background:rgba(240,234,214,.08);border:1px solid rgba(240,234,214,.2);
      display:flex;align-items:center;justify-content:center}
    .bp-qty{position:absolute;bottom:2px;left:4px;font-size:calc(11px*var(--s));font-weight:700;
      color:#ffd54f;text-shadow:0 1px 2px rgba(0,0,0,.8)}
    #memoryPanel{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(12px*var(--s));min-width:calc(250px*var(--s))}
    #bookTabs{display:flex;gap:calc(6px*var(--s));margin-bottom:calc(8px*var(--s))}
    .book-tab{flex:1;border:1px solid #7a5c34;border-radius:8px;background:rgba(240,234,214,.07);
      color:#cdb98a;font-size:calc(12px*var(--s));font-weight:700;padding:calc(4px*var(--s));cursor:pointer}
    .book-tab.active{background:rgba(230,190,80,.85);color:#2b2313;border-color:#b8912f}
    #bookBody{display:flex;flex-direction:column;gap:calc(5px*var(--s));
      max-height:calc(280px*var(--s));overflow-y:auto;font-size:calc(12px*var(--s))}
    .book-cat{font-weight:700;color:#ffd54f;margin-top:calc(4px*var(--s))}
    .book-grid{display:flex;flex-wrap:wrap;gap:calc(6px*var(--s))}
    .book-item{display:flex;align-items:center;gap:4px;background:rgba(240,234,214,.07);
      border-radius:8px;padding:2px 7px 2px 3px}
    .book-mem{display:flex;flex-direction:column;background:rgba(240,234,214,.07);
      border-radius:8px;padding:calc(4px*var(--s)) calc(7px*var(--s))}
    .book-when{color:#cdb98a;font-size:calc(10px*var(--s));font-weight:700}
    .book-empty{color:#9a8f74;font-style:italic}
    #skillsPanel{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(12px*var(--s));min-width:calc(210px*var(--s))}
    #skillsTotal{text-align:center;font-size:calc(11px*var(--s));color:#cdb98a;font-weight:700;
      margin-bottom:calc(6px*var(--s));font-variant-numeric:tabular-nums}
    /* v2 block #2: town Fame line above the skills total */
    #skillsRep{display:flex;align-items:center;justify-content:center;gap:calc(6px*var(--s));
      font-size:calc(11px*var(--s));font-weight:800;margin-bottom:calc(6px*var(--s));
      padding-bottom:calc(6px*var(--s));border-bottom:1px solid rgba(240,234,214,.12);
      color:#ffd08a;font-variant-numeric:tabular-nums}
    #skillsRep .rep-tier{letter-spacing:.03em;text-transform:uppercase;font-size:calc(10px*var(--s))}
    #skillsRep .rep-val{color:#ffd54f}
    #skillsList{display:flex;flex-direction:column;gap:calc(4px*var(--s));
      max-height:calc(150px*var(--s));overflow-y:auto}
    .sk-row{position:relative;display:flex;align-items:center;gap:calc(8px*var(--s));
      padding:calc(4px*var(--s)) calc(6px*var(--s));border-radius:8px;background:rgba(240,234,214,.07)}
    .sk-lock{background:transparent;border:1px solid rgba(240,234,214,.25);border-radius:6px;
      color:#e8c34f;font-size:calc(11px*var(--s));width:calc(24px*var(--s));height:calc(22px*var(--s));
      cursor:pointer;padding:0;line-height:1}
    .sk-name{flex:1;font-size:calc(13px*var(--s));font-weight:700}
    /* R8/B1: the earned tier (Novice/Skilled/Expert), colour-keyed */
    .sk-tier{font-size:calc(10px*var(--s));font-weight:800;letter-spacing:.04em;
      text-transform:uppercase;padding:calc(1px*var(--s)) calc(6px*var(--s));border-radius:6px;
      color:#cdb98a;background:rgba(240,234,214,.08);border:1px solid rgba(240,234,214,.14)}
    .sk-tier[data-tier="Skilled"]{color:#9fe36a;background:rgba(159,227,106,.12);border-color:rgba(159,227,106,.3)}
    .sk-tier[data-tier="Expert"]{color:#ffd54f;background:rgba(230,190,80,.16);border-color:rgba(230,190,80,.4)}
    .sk-value{font-size:calc(13px*var(--s));font-weight:700;color:#ffd54f;min-width:calc(36px*var(--s));
      text-align:right;font-variant-numeric:tabular-nums}
    .sk-float{position:absolute;right:calc(40px*var(--s));top:0;pointer-events:none}
    .sk-pop{position:absolute;right:0;color:#9fe36a;font-size:calc(12px*var(--s));font-weight:700;
      text-shadow:0 1px 2px rgba(0,0,0,.8);animation:skpop 1.1s ease-out forwards}
    @keyframes skpop{from{transform:translateY(2px);opacity:1}to{transform:translateY(-16px);opacity:0}}
    /* Quest log window (R6): Active / Completed tabs, per-quest step checklist +
       reward preview + abandon. Reuses the shared --s scale + cell chrome. */
    #questPanel{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(12px*var(--s));min-width:calc(300px*var(--s))}
    #questTabs{display:flex;gap:calc(6px*var(--s));margin-bottom:calc(8px*var(--s))}
    .q-tab{flex:1;border:1px solid #7a5c34;border-radius:8px;background:rgba(240,234,214,.07);
      color:#cdb98a;font-size:calc(12px*var(--s));font-weight:700;padding:calc(4px*var(--s));cursor:pointer}
    .q-tab.active{background:rgba(230,190,80,.85);color:#2b2313;border-color:#b8912f}
    #questBody{display:flex;flex-direction:column;gap:calc(8px*var(--s));
      min-height:calc(240px*var(--s));max-height:calc(360px*var(--s));
      overflow-y:auto;width:calc(300px*var(--s))}
    .q-getting{background:rgba(90,120,70,.12);border:1px solid var(--hairline);border-radius:var(--r-s);
      padding:calc(7px*var(--s)) calc(10px*var(--s))}
    .q-getting .q-kicker{color:var(--muted);font-size:calc(10px*var(--s));font-weight:800;
      letter-spacing:.06em;text-transform:uppercase}
    .q-getting .q-gtitle{color:var(--gold);font-weight:800;font-size:calc(13px*var(--s));margin-top:2px}
    .q-getting .q-gbody{font-size:calc(12px*var(--s));line-height:1.45;opacity:.92;margin-top:2px}
    .q-card{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:var(--r-s);
      padding:calc(8px*var(--s)) calc(11px*var(--s))}
    .q-card.q-ready{border-color:var(--gold-soft);box-shadow:0 0 0 1px var(--hairline) inset}
    .q-title{display:flex;align-items:center;gap:calc(6px*var(--s));font-size:calc(14px*var(--s));
      font-weight:800;color:var(--gold)}
    .q-giver{font-size:calc(11px*var(--s));color:var(--muted);font-weight:700;margin:1px 0 5px}
    .q-desc{font-size:calc(12px*var(--s));line-height:1.5;opacity:.9;margin-bottom:calc(6px*var(--s))}
    .q-steps{display:flex;flex-direction:column;gap:calc(3px*var(--s));margin-bottom:calc(6px*var(--s))}
    .q-step{display:flex;align-items:center;gap:calc(7px*var(--s));font-size:calc(12px*var(--s))}
    .q-tick{flex:none;width:calc(16px*var(--s));height:calc(16px*var(--s));border-radius:5px;
      display:flex;align-items:center;justify-content:center;font-size:calc(11px*var(--s));
      border:1px solid var(--cell-edge);background:rgba(0,0,0,.15);color:var(--muted)}
    .q-step.done .q-tick{background:rgba(159,227,106,.22);border-color:#6ea84a;color:#9fe36a}
    .q-step.done .q-slabel{opacity:.7;text-decoration:line-through}
    .q-slabel{flex:1}
    .q-scount{font-variant-numeric:tabular-nums;color:var(--muted);font-weight:700;font-size:calc(11px*var(--s))}
    .q-reward{font-size:calc(11.5px*var(--s));color:#cfe8b0;font-weight:700;margin-top:calc(2px*var(--s))}
    .q-readytag{font-size:calc(10px*var(--s));font-weight:800;letter-spacing:.05em;color:#241d0e;
      background:rgba(230,190,80,.92);border-radius:6px;padding:1px calc(6px*var(--s))}
    .q-abandon{margin-top:calc(6px*var(--s));background:transparent;border:1px solid var(--cell-edge);
      border-radius:7px;color:var(--muted);font:inherit;font-size:calc(11px*var(--s));font-weight:700;
      padding:calc(3px*var(--s)) calc(9px*var(--s));cursor:pointer}
    .q-abandon:hover{border-color:#c94f3a;color:#f0906f}
    .q-empty{color:#9a8f74;font-style:italic;font-size:calc(12px*var(--s));padding:calc(6px*var(--s))}
    #shopWindow{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(14px*var(--s));min-width:calc(320px*var(--s))}
    /* gift chooser: a small item picker reusing the shop's row/button chrome */
    #giftChooser{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(14px*var(--s));min-width:calc(280px*var(--s))}
    #giftList{display:flex;flex-direction:column;gap:calc(4px*var(--s));
      max-height:calc(300px*var(--s));overflow-y:auto}
    .shop-head{display:flex;justify-content:center;gap:6px;font-size:calc(13px*var(--s));
      margin-bottom:calc(8px*var(--s));color:#ffd54f;font-weight:700}
    .shop-section{font-size:calc(12px*var(--s));font-weight:700;color:#cdb98a;text-transform:uppercase;
      letter-spacing:.06em;margin:calc(8px*var(--s)) 0 calc(4px*var(--s))}
    .shop-row{display:flex;align-items:center;gap:calc(8px*var(--s));padding:calc(4px*var(--s)) calc(6px*var(--s));
      border-radius:8px;background:rgba(240,234,214,.07);margin-bottom:calc(4px*var(--s))}
    .shop-icon{flex:none;background:rgba(240,234,214,.08);border-radius:6px}
    .shop-name{flex:1;font-size:calc(13px*var(--s));font-weight:700}
    .shop-total{font-size:calc(12px*var(--s));color:#ffd54f;font-variant-numeric:tabular-nums;white-space:nowrap}
    .shop-step{display:flex;align-items:center;gap:4px}
    .shop-step button{width:calc(22px*var(--s));height:calc(22px*var(--s));border-radius:6px;cursor:pointer;
      border:1px solid rgba(240,234,214,.3);background:transparent;color:#f0ead6;
      font-size:calc(13px*var(--s));line-height:1;padding:0}
    .shop-qty{min-width:calc(20px*var(--s));text-align:center;font-size:calc(13px*var(--s));
      font-weight:700;font-variant-numeric:tabular-nums}
    .shop-btn{border:2px solid #b8912f;border-radius:8px;background:rgba(230,190,80,.9);color:#241d0e;
      font-weight:700;font-size:calc(12px*var(--s));padding:calc(4px*var(--s)) calc(10px*var(--s));cursor:pointer}
    .shop-btn:hover{background:#f2cf6b}
    .shop-sellall{display:block;margin:calc(2px*var(--s)) auto 0}
    .shop-empty{font-size:calc(12px*var(--s));opacity:.75;padding:calc(4px*var(--s)) calc(6px*var(--s))}
    /* Customers at your stall (v2): a warmer-tinted row that reads apart from
       the flat sell list, with the premium price called out in the same gold. */
    #shopCustomers .shop-row{background:rgba(230,190,80,.12);border:1px solid rgba(230,190,80,.28)}
    .shop-cust-want{font-size:calc(11px*var(--s));opacity:.8;font-weight:600}
    /* Each list scrolls within a bounded region (the scale-window model: the
       window's height controls how much of the scroll region shows), so the
       trade window opens at a sensible size instead of collapsing / running off
       the screen when the buy list is long. */
    #shopCustomers{max-height:calc(150px*var(--s));overflow-y:auto}
    #shopSell{max-height:calc(230px*var(--s));overflow-y:auto}
    #shopBuy{max-height:calc(240px*var(--s));overflow-y:auto}
    /* Barn storage window (R5): two slot grids (barn + backpack), click a slot
       to move its stack across. Reuses the shop's --s scale + cell chrome. */
    #storageWindow{--s:1;display:inline-block;padding:calc(10px*var(--s)) calc(12px*var(--s))}
    .st-cols{display:flex;gap:calc(14px*var(--s));align-items:flex-start}
    .st-col{display:flex;flex-direction:column}
    .st-grid{display:grid;grid-template-columns:repeat(4,calc(46px*var(--s)));gap:calc(6px*var(--s));
      max-height:calc(280px*var(--s));overflow-y:auto}
    .st-slot{position:relative;width:calc(46px*var(--s));height:calc(46px*var(--s));border-radius:8px;
      background:var(--cell-bg);border:1px solid var(--cell-edge);
      display:flex;align-items:center;justify-content:center;cursor:pointer}
    .st-slot:hover{border-color:var(--gold-soft)}
    .st-slot.st-empty{cursor:default}
    .st-qty{position:absolute;bottom:2px;left:4px;font-size:calc(11px*var(--s));font-weight:700;
      color:#ffd54f;text-shadow:0 1px 2px rgba(0,0,0,.8)}
    .st-hint{font-size:calc(11px*var(--s));color:var(--muted);margin-top:calc(8px*var(--s));
      text-align:center;font-style:italic}
    #opening{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center}
    #opening.dark{background:rgba(14,18,10,.93)}
    #opening.reveal{background:transparent;pointer-events:none;align-items:flex-end}
    .menu-panel{background:rgba(25,32,18,.96);border:2px solid #7a5c34;border-radius:16px;
      padding:28px 36px;color:#f0ead6;text-align:center;max-width:600px}
    .menu-title{font-size:44px;font-weight:800;letter-spacing:.04em;margin:0 0 4px;color:#ffd54f;
      text-shadow:0 2px 8px rgba(0,0,0,.6)}
    .menu-sub{opacity:.75;margin:6px 0 0;font-size:13px}
    .menu-text{font-size:15px;line-height:1.7;margin:0 0 16px}
    .menu-btn{display:block;width:260px;margin:10px auto 0;padding:12px;border-radius:12px;
      border:2px solid #b8912f;background:rgba(230,190,80,.92);color:#241d0e;font-weight:800;
      font-size:16px;cursor:pointer}
    .menu-btn:hover{background:#f2cf6b}
    /* ============ UI design pass: one chrome language for everything ============
       Tokens first, then grouped overrides that win the cascade. Wood border,
       deep green-black gradient panels, a gold hairline inset, soft drop
       shadows under everything that floats. */
    :root{
      --ink:#f0ead6; --gold:#ffd54f; --gold-soft:#e8c34f; --muted:#cdb98a;
      --wood:#7a5c34; --wood-dark:#5d4630;
      /* Title/heading font — the sans stack by default; src/ui/skin.ts swaps in
         the "WildhearthStorybook" pixel font (prepended, sans kept as fallback)
         once it loads. With no font asset the fallback simply stands. */
      --font-title:-apple-system,Segoe UI,Roboto,sans-serif;
      --panel-bg:linear-gradient(180deg,rgba(34,42,25,.95),rgba(20,26,14,.95));
      --hairline:rgba(232,195,79,.28);
      --cell-bg:rgba(240,234,214,.07); --cell-edge:rgba(240,234,214,.16);
      --r:14px; --r-s:9px;
      --float-shadow:0 8px 22px rgba(0,0,0,.55),inset 0 0 0 1px var(--hairline);
      --pill-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 0 0 1px var(--hairline);
    }
    /* pills, prompt, toast: same outlined rounded treatment */
    .pill{background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow)}
    #prompt{background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);color:var(--gold)}
    #toast{background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);color:#cfe8b0}
    /* buttons: one family */
    .tool-btn,.zoom-btn{background:var(--panel-bg);border:2px solid var(--wood);
      border-radius:12px;box-shadow:var(--pill-shadow);transition:border-color .12s,transform .06s}
    .tool-btn:hover,.zoom-btn:hover{border-color:var(--gold-soft)}
    .tool-btn:active,.zoom-btn:active{transform:translateY(1px)}
    .tool-btn.active{background:rgba(230,190,80,.92);border-color:#b8912f;box-shadow:var(--pill-shadow)}
    #actBtn{border:2px solid #b8912f;box-shadow:0 5px 14px rgba(0,0,0,.45)}
    /* item cells / rows: consistent outline */
    .bp-slot,.shop-row,.sk-row,.book-item,.book-mem,.shop-icon,.book-tab{
      background:var(--cell-bg);border:1px solid var(--cell-edge)}
    .book-tab.active{background:rgba(230,190,80,.88);border-color:#b8912f}
    .menu-panel{box-shadow:var(--float-shadow)}
    /* HUD window bodies: the clock (dial + date/weather) and the coins pill */
    #clockWin{display:flex;align-items:center;gap:8px}
    #coinsWin{display:flex;align-items:center}
    #needsWin{display:flex;align-items:center}
    #clockDial{width:64px;height:64px;flex:none;border-radius:50%;
      border:2px solid var(--wood);box-shadow:var(--pill-shadow);background:#1d2440}
    /* min-width keeps the clock window a stable size from boot: the date/weather
       pills start as "—" and only widen once updateHud() runs, so reserve the
       normal-day width up front (right-anchored windows would otherwise overflow). */
    #hudInfo{display:flex;flex-direction:column;gap:4px;align-items:stretch;min-width:104px}
    #hudInfo .pill{padding:3px 10px;font-size:12px;text-align:center}
    #coinsWin .pill{padding:4px 12px;font-size:14px}
    .choice-row{display:flex;gap:14px;justify-content:center;margin:6px 0 4px}
    .choice-card{width:160px;background:rgba(240,234,214,.07);border:2px solid rgba(240,234,214,.25);
      border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center}
    .choice-card:hover{border-color:#e8c34f;background:rgba(230,190,80,.15)}
    .choice-card h3{margin:8px 0 6px;font-size:15px;color:#ffd54f}
    .choice-card p{margin:0;font-size:12px;opacity:.8;line-height:1.45}
    .choice-card.sel{border-color:#e8c34f;background:rgba(230,190,80,.22);
      box-shadow:0 0 0 1px #e8c34f inset}
    .choice-card .cc-note{margin-top:6px;color:#ffd54f;opacity:.95;font-weight:700;font-size:11px}
    /* ============ Character Creation + Path/Goal screens ============ */
    .cc-panel{max-width:760px;width:min(760px,calc(100vw - 24px));
      max-height:92vh;overflow-y:auto;text-align:left}
    .cc-title{font-size:30px;text-align:center;margin-bottom:12px}
    .cc-body{display:flex;gap:22px;align-items:flex-start}
    .cc-left{flex:none}
    .cc-preview{background:radial-gradient(ellipse at 50% 42%,rgba(90,120,70,.35),rgba(14,18,10,.55));
      border:2px solid var(--wood);border-radius:12px;box-shadow:var(--pill-shadow)}
    .cc-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:11px}
    .cc-field{display:flex;flex-direction:column;gap:5px}
    .cc-field.cc-inline{flex-direction:row;align-items:center;gap:12px}
    .cc-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .cc-names{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .cc-input{flex:1;min-width:96px;background:var(--cell-bg);border:1px solid var(--cell-edge);
      border-radius:8px;color:var(--ink);font:inherit;font-size:14px;padding:8px 10px}
    .cc-input:focus{outline:none;border-color:var(--gold-soft)}
    .cc-dice{flex:none;width:40px;height:38px;border-radius:9px;border:2px solid var(--wood);
      background:var(--panel-bg);color:var(--ink);font-size:19px;cursor:pointer;line-height:1;box-shadow:var(--pill-shadow)}
    .cc-dice:hover{border-color:var(--gold-soft)}
    .cc-stepper{display:flex;align-items:center;gap:8px}
    .cc-step{width:30px;height:30px;border-radius:8px;border:1px solid var(--cell-edge);
      background:var(--cell-bg);color:var(--ink);font-size:18px;font-weight:700;cursor:pointer;line-height:1;padding:0}
    .cc-step:hover{border-color:var(--gold-soft)}
    .cc-age-val{min-width:34px;text-align:center;font-size:16px;font-weight:800;color:var(--gold);
      font-variant-numeric:tabular-nums}
    .cc-toggle,.cc-row{display:flex;gap:6px}
    .cc-row.cc-wrap{flex-wrap:wrap}
    .cc-btn{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:8px;
      color:var(--ink);font:inherit;font-size:13px;font-weight:700;padding:6px 12px;cursor:pointer}
    .cc-btn:hover{border-color:var(--gold-soft)}
    .cc-btn.sel{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    .cc-swatch{width:30px;height:30px;border-radius:8px;border:2px solid rgba(240,234,214,.25);
      cursor:pointer;padding:0}
    .cc-swatch:hover{border-color:var(--gold-soft)}
    .cc-swatch.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,213,79,.5)}
    .cc-outfit{width:36px;height:30px}
    .cc-continue{margin-top:16px}
    .cc-section-head{font-size:14px;font-weight:800;color:var(--gold);letter-spacing:.04em;
      text-align:center;margin:14px 0 4px;text-transform:uppercase}
    .goal-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:2px 0}
    .cc-goal{display:flex;flex-direction:column;gap:2px;text-align:left;width:138px;
      background:var(--cell-bg);border:2px solid var(--cell-edge);border-radius:10px;
      color:var(--ink);font:inherit;padding:8px 10px;cursor:pointer}
    .cc-goal:hover{border-color:var(--gold-soft)}
    .cc-goal.sel{border-color:var(--gold);background:rgba(230,190,80,.18)}
    .cc-goal-title{font-size:14px;font-weight:800;color:var(--gold)}
    .cc-goal-blurb{font-size:11px;opacity:.82;line-height:1.35}
    .reveal-bar{pointer-events:auto;margin-bottom:56px;background:rgba(25,32,18,.92);
      border:2px solid #7a5c34;border-radius:14px;padding:16px 24px;text-align:center;max-width:600px;
      color:#f0ead6}
    .ctxmenu{position:fixed;z-index:8;min-width:130px;background:rgba(25,32,18,.96);
      border:2px solid #7a5c34;border-radius:10px;padding:4px;box-shadow:0 4px 14px rgba(0,0,0,.5);
      display:flex;flex-direction:column;gap:2px}
    .ctx-item{background:transparent;border:none;color:#f0ead6;font:inherit;font-size:14px;
      text-align:left;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap}
    .ctx-item:hover{background:rgba(230,190,80,.9);color:#241d0e}
    /* the always-visible needs strip (7 code-drawn icons) — now the body of the
       Needs window; the window's own chrome is the wood panel behind it. */
    #needsStrip{display:block}
    /* fade-to-black overlay for sleep / collapse time skips */
    #fade{position:fixed;inset:0;z-index:20;background:#000;opacity:0;pointer-events:none;
      display:flex;align-items:center;justify-content:center;color:var(--gold);
      font-size:20px;font-weight:800;letter-spacing:.04em;text-shadow:0 2px 8px rgba(0,0,0,.7)}
    /* the dialogue window (Windows migration II): chrome (position/background/
       border/shadow/show-hide) lives in .wh-window now; #dialogueBox is plain
       content (the NPC's name lives in the window's own title bar). */
    #dialogueBox{color:var(--ink);padding:12px 16px}
    #dlgText{font-size:15px;line-height:1.5;min-height:42px;margin-bottom:10px}
    #dlgChoices{display:flex;flex-direction:column;gap:6px}
    .dlg-choice{display:flex;gap:10px;align-items:center;text-align:left;width:100%;
      background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:var(--r-s);
      color:var(--ink);font:inherit;font-size:14px;padding:8px 12px;cursor:pointer}
    .dlg-choice:hover{border-color:var(--gold-soft);background:rgba(230,190,80,.14)}
    .dlg-key{flex:none;width:20px;height:20px;border-radius:6px;background:rgba(232,195,79,.18);
      color:var(--gold);font-weight:800;font-size:12px;display:flex;align-items:center;
      justify-content:center;font-variant-numeric:tabular-nums}
    /* End-of-day summary: a "quick" 3-line toast-style pill that auto-fades
       (unchanged by Windows migration II — never a panel to begin with), and
       a "full" summary that IS now a wm window (Windows migration II) — its
       title bar shows "<Season>, Day N — day complete" dynamically; #eodPanel
       is plain content (bounded + scrollable for a long day's ledger). */
    #eodQuick{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:none;
      background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);
      color:var(--ink);padding:10px 18px;border-radius:12px;font-size:13px;line-height:1.6;
      font-weight:700;text-align:center;z-index:6;white-space:nowrap;transition:opacity .3s linear}
    #eodPanel{color:var(--ink);padding:14px 20px;max-height:min(500px,calc(100vh - 80px));overflow-y:auto}
    .eod-row{font-size:14px;padding:3px 0}
    .eod-achieve-head{color:var(--gold);font-weight:700;font-size:13px;margin:10px 0 2px;
      border-top:1px solid var(--hairline);padding-top:8px;text-transform:uppercase;letter-spacing:.05em}
    #eodHint{text-align:center;color:var(--muted);font-size:12px;margin-top:12px;font-style:italic}
    /* ===== Guidance Mode (Part A #5) ===== */
    /* Tutorial step bubble — a transparent panel, top-centre of the play area,
       shown while game-time is paused for the step (DECISIONS). */
    #tutorialBubble{position:absolute;top:96px;left:50%;transform:translateX(-50%);
      width:min(360px,calc(100% - 40px));display:none;z-index:7;color:var(--ink);
      background:linear-gradient(180deg,rgba(34,42,25,.82),rgba(20,26,14,.82));
      border:2px solid var(--wood);border-radius:var(--r);box-shadow:var(--float-shadow);
      padding:12px 16px;backdrop-filter:blur(1.5px)}
    #tutTitle{color:var(--gold);font-weight:800;font-size:15px;letter-spacing:.03em;margin-bottom:6px}
    #tutBody{font-size:14px;line-height:1.5;margin-bottom:10px}
    #tutBtns{display:flex;gap:8px;justify-content:flex-end}
    #tutSkip,#tutDismiss{border-radius:8px;font:inherit;font-size:12px;font-weight:700;
      padding:6px 12px;cursor:pointer;border:1px solid var(--cell-edge);background:var(--cell-bg);color:var(--ink)}
    #tutDismiss{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    #tutSkip:hover,#tutDismiss:hover{border-color:var(--gold-soft)}
    /* persistent Help (?) icon — visible whenever the Tutorial is active */
    #helpBtn{position:absolute;top:96px;right:14px;width:40px;height:40px;border-radius:50%;
      display:none;align-items:center;justify-content:center;z-index:7;cursor:pointer;
      border:2px solid #b8912f;background:rgba(230,190,80,.92);color:#241d0e;
      font-size:22px;font-weight:800;line-height:1;box-shadow:var(--pill-shadow)}
    /* Aspiration objective pill — small, dismissible, non-blocking */
    #aspirationPill{position:absolute;top:98px;left:50%;transform:translateX(-50%);
      display:none;align-items:center;gap:8px;z-index:6;max-width:min(440px,calc(100% - 40px));
      background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);
      color:var(--ink);padding:6px 8px 6px 14px;border-radius:12px;font-size:13px;font-weight:700}
    #aspText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #aspClose{flex:none;background:transparent;border:none;color:var(--muted);font-size:13px;
      cursor:pointer;padding:2px 4px;line-height:1}
    #aspClose:hover{color:var(--ink)}
    /* shared guidance modal (Continue-Tutorial on load / Skip-Tutorial confirm) */
    #guidanceScrim{position:fixed;inset:0;z-index:12;display:none;background:rgba(10,12,8,.6)}
    #guidancePrompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:13;
      background:var(--panel-bg);border:2px solid var(--wood);border-radius:var(--r);
      box-shadow:var(--float-shadow);color:var(--ink);padding:22px 28px;text-align:center;
      max-width:min(420px,calc(100vw - 40px))}
    #gpTitle{font-size:16px;line-height:1.55;font-weight:700;margin-bottom:8px}
    #gpBtns{display:flex;flex-direction:column;align-items:center}
    #gpBtns .menu-btn{width:280px}
    /* ============ Main menu (Part E #1) — painted vista + button column ======= */
    #opening.menu-root{background:#10140a;display:block}
    .menu-vista{position:absolute;inset:0;width:100%;height:100%;display:block}
    .menu-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:flex-end;padding-bottom:7vh;pointer-events:none}
    .menu-buttons{display:flex;flex-direction:column;gap:9px;width:290px;pointer-events:auto}
    .mm-btn{margin:0;width:100%;position:relative;box-shadow:0 4px 14px rgba(0,0,0,.5)}
    .menu-btn:focus-visible,.menu-btn:focus{outline:none;border-color:#fff2cf;
      box-shadow:0 0 0 3px rgba(255,213,79,.45),0 4px 14px rgba(0,0,0,.5)}
    .menu-btn.disabled,.menu-btn:disabled{opacity:.42;cursor:default;filter:grayscale(.4)}
    .menu-btn.disabled:hover,.menu-btn:disabled:hover{background:rgba(230,190,80,.92)}
    .mm-big{display:flex;flex-direction:column;gap:2px;padding:9px 12px}
    .mm-big-title{font-size:16px;font-weight:800}
    .mm-big-sub{font-size:11px;font-weight:700;opacity:.85;color:#3a2f14}
    .menu-badge{position:absolute;top:-7px;right:-7px;min-width:20px;height:20px;border-radius:11px;
      background:#c94f3a;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;
      justify-content:center;padding:0 5px;border:2px solid #2b2313;box-shadow:0 2px 6px rgba(0,0,0,.5)}
    .menu-btn-ghost{background:var(--cell-bg);color:var(--ink);border-color:var(--wood)}
    .menu-btn-ghost:hover{background:rgba(240,234,214,.14)}
    .menu-modal-scrim{position:absolute;inset:0;z-index:10;display:flex;align-items:center;
      justify-content:center;background:rgba(8,10,6,.72)}
    .menu-modal{max-width:min(420px,calc(100vw - 40px))}
    .menu-modal-title{color:var(--gold);font-size:20px;font-weight:800;margin:0 0 6px}
    .farewell-panel{text-align:center}
    .farewell-heart{font-size:42px;margin-bottom:6px}
    /* Pause screen — a dimmed scrim so the frozen farm shows through behind it */
    #opening.paused{background:rgba(8,10,6,.6);display:flex;align-items:center;justify-content:center}
    .pause-panel{text-align:center;min-width:300px}
    .pause-buttons{margin:12px auto 0;width:260px}
    .pause-feedback{min-height:20px;margin-top:10px;font-size:14px;font-weight:800;color:#9fe36a}
    .exit-panel{text-align:center;min-width:320px}
    .exit-panel .menu-buttons{margin:14px auto 0;width:280px}
    /* ============ Back-able screens (What's New / Help / Credits / Settings) === */
    .screen-panel{width:min(680px,calc(100vw - 24px));max-height:90vh;display:flex;
      flex-direction:column;text-align:left;padding:18px 22px}
    .screen-wide{width:min(820px,calc(100vw - 24px))}
    .screen-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;
      border-bottom:1px solid var(--hairline);padding-bottom:10px}
    .screen-back{flex:none;background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:9px;
      color:var(--ink);font:inherit;font-size:14px;font-weight:700;padding:7px 13px;cursor:pointer}
    .screen-back:hover{border-color:var(--gold-soft);background:rgba(230,190,80,.14)}
    .screen-title{font-size:26px;text-align:left;margin:0}
    .screen-body{overflow-y:auto;padding-right:4px;flex:1;min-height:0}
    /* What's New */
    .wn-list{display:flex;flex-direction:column;gap:12px}
    .wn-entry{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:var(--r-s);
      padding:12px 14px}
    .wn-top{display:flex;align-items:center;gap:10px}
    .wn-title{font-size:16px;font-weight:800;color:var(--gold)}
    .wn-new{font-size:10px;font-weight:800;letter-spacing:.08em;color:#fff;background:#c94f3a;
      border-radius:6px;padding:2px 6px}
    .wn-meta{font-size:11px;font-weight:700;color:var(--muted);margin:2px 0 6px;text-transform:uppercase;
      letter-spacing:.04em}
    .wn-sum{font-size:14px;line-height:1.55;margin:0;opacity:.94}
    /* Help */
    .help-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .help-tab{display:flex;align-items:center;gap:6px;background:var(--cell-bg);border:1px solid var(--cell-edge);
      border-radius:9px;color:var(--ink);font:inherit;font-size:13px;font-weight:700;padding:7px 11px;cursor:pointer}
    .help-tab:hover{border-color:var(--gold-soft)}
    .help-tab.active{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    .help-tab-ic{font-size:15px;line-height:1}
    .help-pane{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:var(--r-s);
      padding:14px 16px}
    .help-intro{font-size:15px;line-height:1.6;margin:0 0 10px}
    .help-points{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:7px}
    .help-points li{font-size:14px;line-height:1.5}
    /* Credits */
    .credits-scroll{display:flex;flex-direction:column;gap:16px;text-align:center;padding:8px 0}
    .credits-block{display:flex;flex-direction:column;gap:3px}
    .credits-head{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
      color:var(--gold);margin-bottom:2px}
    .credits-line{font-size:15px;line-height:1.5;margin:0;opacity:.94}
    /* ============ Project Docs — the developer/archive reading room ============
       A near-fullscreen reading room: grouped sidebar | parchment reader | TOC,
       with a cross-doc search. Body text uses the readable sans stack (reading
       comfort wins); only the display headings pick up --font-title. */
    .docs-panel{width:min(1240px,calc(100vw - 20px));height:min(92vh,900px);
      display:flex;flex-direction:column;text-align:left;padding:16px 18px;max-width:none}
    .docs-head{display:flex;align-items:center;gap:14px;margin-bottom:12px;
      border-bottom:1px solid var(--hairline);padding-bottom:10px}
    .docs-title{font-size:24px;margin:0;flex:none}
    .docs-search{margin-left:auto;flex:0 1 320px;background:var(--cell-bg);
      border:1px solid var(--cell-edge);border-radius:10px;color:var(--ink);
      font:inherit;font-size:14px;padding:9px 13px;outline:none}
    .docs-search:focus{border-color:var(--gold-soft);background:rgba(230,190,80,.1)}
    .docs-search::placeholder{color:var(--muted)}
    .docs-body{flex:1;min-height:0;display:flex;gap:16px}
    /* -- sidebar -- */
    .docs-sidebar{flex:0 0 236px;overflow-y:auto;padding-right:6px;
      display:flex;flex-direction:column;gap:2px}
    .docs-group{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;
      color:var(--gold);margin:14px 0 5px;padding-left:2px}
    .docs-group:first-child{margin-top:0}
    .docs-navitem{display:flex;flex-direction:column;gap:1px;text-align:left;width:100%;
      background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:9px;
      color:var(--ink);font:inherit;padding:8px 11px;cursor:pointer;transition:border-color .1s,background .1s}
    .docs-navitem:hover{border-color:var(--gold-soft);background:rgba(230,190,80,.1)}
    .docs-navitem.active{border-color:#b8912f;background:rgba(230,190,80,.2)}
    .docs-navtitle{font-size:13.5px;font-weight:700;line-height:1.25}
    .docs-navfile{font-size:10.5px;color:var(--muted);font-family:ui-monospace,Menlo,Consolas,monospace}
    /* -- reader + toc -- */
    .docs-readerwrap{flex:1;min-width:0;display:flex;gap:14px}
    .docs-reader{flex:1;min-width:0;overflow-y:auto;border-radius:12px;
      /* the parchment reading pane — warm paper, dark ink, generous measure */
      background:linear-gradient(180deg,#f3e9d0,#ecdfc0);color:#33291a;
      box-shadow:inset 0 0 0 1px rgba(90,64,30,.25),0 6px 18px rgba(0,0,0,.4);
      padding:26px 34px;scroll-behavior:smooth}
    .docs-toc{flex:0 0 194px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;
      padding-right:2px}
    .docs-toc.empty{display:none}
    .docs-toc-label{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
      color:var(--muted);margin-bottom:4px}
    .docs-toc-item{text-align:left;background:none;border:0;border-left:2px solid transparent;
      color:var(--muted);font:inherit;font-size:12.5px;line-height:1.35;padding:3px 8px;cursor:pointer}
    .docs-toc-item:hover{color:var(--ink);border-left-color:var(--gold-soft)}
    .docs-toc-l3{padding-left:18px;font-size:12px;opacity:.9}
    @media (max-width:900px){.docs-toc{display:none}.docs-sidebar{flex-basis:180px}}
    /* -- welcome / spinner / search states -- */
    .docs-spinner,.docs-welcome{color:#5a4a30;padding:12px 4px}
    .docs-welcome-h{font-family:var(--font-title);font-size:22px;color:#4a3418;margin-bottom:8px}
    .docs-welcome p{font-size:15px;line-height:1.65;max-width:52ch;margin:0}
    .docs-results-summary{font-size:13px;font-weight:700;color:#5a4a30;
      border-bottom:1px solid rgba(90,64,30,.25);padding-bottom:8px;margin-bottom:12px}
    .docs-result-card{margin-bottom:16px}
    .docs-result-doc{font-family:var(--font-title);font-size:16px;font-weight:800;color:#4a3418;margin-bottom:5px}
    .docs-result-count{font-family:-apple-system,Segoe UI,Roboto,sans-serif;
      font-size:12px;font-weight:600;color:#7a6238}
    .docs-result-hit,.docs-result-more{display:block;text-align:left;width:100%;
      background:rgba(255,255,255,.4);border:1px solid rgba(90,64,30,.18);border-radius:7px;
      color:#3a2f1e;font:inherit;font-size:13px;line-height:1.5;padding:6px 10px;margin:4px 0;cursor:pointer;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .docs-result-hit:hover,.docs-result-more:hover{background:rgba(255,240,200,.85);border-color:var(--wood)}
    .docs-result-more{font-style:italic;color:#6a5638;font-size:12px}
    .docs-hl{background:#ffd54f;color:#241d0e;border-radius:2px;padding:0 1px}
    .docs-hl-live{background:#ffcf3f;box-shadow:0 0 0 2px rgba(255,207,63,.5)}
    /* ============ Markdown body inside the parchment reader ============ */
    .md-body{font-size:15px;line-height:1.68;color:#33291a;max-width:74ch}
    .md-h{font-family:var(--font-title);color:#3a2a12;line-height:1.25;margin:1.5em 0 .5em;font-weight:800}
    .md-h1{font-size:26px;margin-top:0;border-bottom:2px solid rgba(90,64,30,.3);padding-bottom:.3em}
    .md-h2{font-size:21px;border-bottom:1px solid rgba(90,64,30,.22);padding-bottom:.24em}
    .md-h3{font-size:17.5px}
    .md-h4{font-size:15.5px}
    .md-h5,.md-h6{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:#5a4a30}
    .md-p{margin:.55em 0}
    .md-body strong{font-weight:800;color:#2a2110}
    .md-body em{font-style:italic}
    .md-code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.88em;
      background:rgba(90,64,30,.12);border:1px solid rgba(90,64,30,.16);border-radius:4px;padding:.05em .35em}
    .md-pre{background:#2a2418;color:#ece3cf;border-radius:8px;padding:12px 14px;margin:.8em 0;
      overflow-x:auto;box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)}
    .md-pre code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5;white-space:pre}
    .md-list{margin:.5em 0;padding-left:1.5em;display:flex;flex-direction:column;gap:.28em}
    .md-list .md-list{margin:.28em 0 0}
    .md-li{line-height:1.55}
    .md-li .md-check{margin-right:.15em}
    ul.md-list{list-style:disc}
    ol.md-list{list-style:decimal}
    li.md-li:has(.md-check){list-style:none;margin-left:-1.2em}
    .md-quote{border-left:3px solid var(--wood);background:rgba(90,64,30,.08);
      margin:.7em 0;padding:.5em .9em;color:#4a3d28;font-style:italic;border-radius:0 6px 6px 0}
    .md-body hr{border:0;border-top:2px solid rgba(90,64,30,.25);margin:1.4em 0}
    .md-link{color:#8a5a1a;font-weight:600}
    .md-link-url{color:#7a6238;font-size:.85em}
    .md-table-wrap{overflow-x:auto;margin:.9em 0}
    .md-table{border-collapse:collapse;font-size:13.5px;min-width:min(100%,420px)}
    .md-table th,.md-table td{border:1px solid rgba(90,64,30,.28);padding:6px 11px;text-align:left;vertical-align:top}
    .md-table th{background:rgba(90,64,30,.14);font-weight:800;color:#3a2a12}
    .md-table tr:nth-child(even) td{background:rgba(90,64,30,.05)}
    /* keep the parchment reader legible in a dark-forced context (it's its own
       light surface by design; nothing to invert) */
    /* ============ Settings screen (Part E #3) ============ */
    .set-section{margin-bottom:18px}
    .set-section-title{font-size:15px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
      color:var(--gold);border-bottom:1px solid var(--hairline);padding-bottom:6px;margin-bottom:8px}
    .set-note{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px}
    .set-row{display:flex;align-items:flex-start;gap:14px;padding:7px 0}
    .set-row-block{flex-direction:column;align-items:stretch;gap:6px}
    .set-row-check{padding:5px 0}
    .set-label{flex:0 0 190px;font-size:14px;font-weight:700;padding-top:3px}
    .set-row-block>.set-label{flex:none;padding-top:0;margin-bottom:2px}
    .set-control{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
    .set-rownote,.set-checknote{font-size:11.5px;color:var(--muted)}
    .set-seg{display:inline-flex;gap:4px;flex-wrap:wrap}
    .set-seg-btn{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:8px;
      color:var(--ink);font:inherit;font-size:13px;font-weight:700;padding:6px 14px;cursor:pointer}
    .set-seg-btn:hover:not(:disabled){border-color:var(--gold-soft)}
    .set-seg-btn.sel{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    .set-seg-btn:disabled{opacity:.4;cursor:not-allowed}
    .set-check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:14px;font-weight:700}
    .set-check input{width:18px;height:18px;accent-color:#e8c34f;cursor:pointer;flex:none}
    .set-check .set-checknote{margin-left:6px;font-weight:400}
    .set-check.set-disabled{opacity:.45;cursor:default}
    .set-slider-wrap{display:flex;align-items:center;gap:12px}
    .set-slider{flex:1;min-width:120px;max-width:280px;accent-color:#e8c34f;cursor:pointer}
    .set-value{font-size:13px;font-weight:800;color:var(--gold);min-width:78px;
      font-variant-numeric:tabular-nums}
    .set-input{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:8px;
      color:var(--ink);font:inherit;font-size:14px;padding:8px 10px}
    .set-input:focus{outline:none;border-color:var(--gold-soft)}
    .set-key-wrap{display:flex;gap:6px;align-items:center}
    .set-key{flex:1;min-width:160px}
    .set-budget{width:150px}
    .set-eye{flex:none;background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:8px;
      color:var(--ink);font-size:15px;padding:7px 11px;cursor:pointer;line-height:1}
    .set-eye:hover{border-color:var(--gold-soft)}
    .set-ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px}
    .set-btn{background:rgba(230,190,80,.92);border:2px solid #b8912f;border-radius:9px;color:#241d0e;
      font:inherit;font-size:13px;font-weight:800;padding:7px 16px;cursor:pointer}
    .set-btn:hover:not(:disabled){background:#f2cf6b}
    .set-btn:disabled{opacity:.42;cursor:not-allowed;filter:grayscale(.3)}
    .set-btn-danger{background:rgba(180,64,50,.9);border-color:#7a2b22;color:#ffe6e0}
    .set-btn-danger:hover:not(:disabled){background:#c94f3a}
    .set-feedback{margin-left:12px;font-size:13px;font-weight:800;color:#9fe36a}
    .set-feedback.set-ok{color:#9fe36a}
    .set-feedback.set-err{color:#f0906f}
    .set-inline{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
    .set-slot{font-size:13px;color:var(--ink);opacity:.92}
    .set-select{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:8px;
      color:var(--ink);font:inherit;font-size:14px;padding:7px 10px;cursor:pointer}
    .set-select:disabled{opacity:.55;cursor:not-allowed}
    /* ============ Accessibility: font scale + high contrast (Part E #3) ======= */
    :root{--ui-fs:1}
    :root.font-large{--ui-fs:1.18}
    .menu-btn{font-size:calc(var(--ui-fs,1)*16px)}
    .menu-text{font-size:calc(var(--ui-fs,1)*15px)}
    .screen-title{font-size:calc(var(--ui-fs,1)*26px)}
    .wn-title{font-size:calc(var(--ui-fs,1)*16px)}
    .wn-sum{font-size:calc(var(--ui-fs,1)*14px)}
    .help-intro{font-size:calc(var(--ui-fs,1)*15px)}
    .help-points li{font-size:calc(var(--ui-fs,1)*14px)}
    #dlgText{font-size:calc(var(--ui-fs,1)*15px)}
    .set-label,.set-check{font-size:calc(var(--ui-fs,1)*14px)}
    .set-section-title{font-size:calc(var(--ui-fs,1)*15px)}
    .set-seg-btn{font-size:calc(var(--ui-fs,1)*13px)}
    :root.high-contrast{
      --ink:#ffffff; --gold:#ffe27a; --gold-soft:#ffd75a; --muted:#efe4c8;
      --wood:#caa25e; --hairline:rgba(255,226,122,.65);
      --cell-bg:rgba(255,255,255,.16); --cell-edge:rgba(255,255,255,.6);
      --panel-bg:linear-gradient(180deg,#1c2413,#0d1207);
    }
    :root.high-contrast .menu-btn,:root.high-contrast .set-btn,:root.high-contrast .screen-back{border-width:2.5px}
    :root.high-contrast .set-note,:root.high-contrast .wn-meta,:root.high-contrast .menu-sub{opacity:1}
    /* ======================================================================
       Window system (UO-classic desktop) — src/ui/windows/*. The desktop is a
       code-drawn wood/leather surface; windows share the game's wood/gold
       chrome. Everything below z-indexes UNDER the full-screen modal overlays
       (#opening / #eodPanel / #fade …), which keep their own high z.
       ====================================================================== */
    #whDesktop{position:fixed;inset:0;z-index:1;overflow:hidden;
      background:
        radial-gradient(ellipse at 50% 38%, rgba(74,54,32,.42), rgba(6,4,2,.6)),
        repeating-linear-gradient(90deg, rgba(0,0,0,.14) 0 2px, transparent 2px 5px),
        repeating-linear-gradient(180deg, rgba(0,0,0,.16) 0 39px, rgba(255,220,150,.028) 39px 41px),
        linear-gradient(180deg,#2b2013,#1c140b)}
    .wh-window{position:absolute;box-sizing:border-box;display:flex;flex-direction:column;
      border-radius:10px;color:var(--ink);background:var(--panel-bg);
      box-shadow:0 8px 22px rgba(0,0,0,.55), inset 0 0 0 2px var(--wood), inset 0 0 0 3px var(--hairline)}
    .wh-titlebar{flex:none;height:26px;display:flex;align-items:center;gap:6px;padding:0 4px 0 8px;
      cursor:move;user-select:none;border-radius:8px 8px 0 0;
      background:linear-gradient(180deg,#6b4f30,#4e3a24);
      box-shadow:inset 0 -1px 0 rgba(0,0,0,.4), inset 0 1px 0 rgba(255,213,79,.15)}
    .wh-pinned>.wh-titlebar{cursor:default;background:linear-gradient(180deg,#54452c,#3b2f1e)}
    .wh-pinned{box-shadow:0 8px 22px rgba(0,0,0,.55), inset 0 0 0 2px #9a7a44, inset 0 0 0 3px rgba(255,213,79,.5)}
    .wh-title{flex:1;min-width:0;display:flex;align-items:center;gap:6px;overflow:hidden}
    .wh-icon{flex:none;font-size:13px;line-height:1}
    .wh-title-text{flex:1;min-width:0;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.03em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wh-ctrls{flex:none;display:flex;gap:2px}
    .wh-btn{width:20px;height:18px;border-radius:5px;border:1px solid rgba(0,0,0,.35);
      background:rgba(240,234,214,.10);color:var(--ink);font-size:12px;line-height:1;cursor:pointer;
      display:flex;align-items:center;justify-content:center;padding:0}
    .wh-btn:hover{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    .wh-body{flex:1;min-height:0;position:relative;overflow:hidden;border-radius:0 0 8px 8px}
    /* small HUD windows get inner breathing room; the viewport fills edge-to-edge */
    .wh-window:not(.wh-resizable)>.wh-body{padding:5px 7px}
    .wh-fill{position:absolute;inset:0}
    /* invisible resize grab-bands (edges + corners) */
    .wh-rz{position:absolute;--hz:6px;touch-action:none;z-index:3}
    .wh-rz-n{top:calc(var(--hz)*-1);left:6px;right:6px;height:calc(var(--hz)*2);cursor:ns-resize}
    .wh-rz-s{bottom:calc(var(--hz)*-1);left:6px;right:6px;height:calc(var(--hz)*2);cursor:ns-resize}
    .wh-rz-e{top:6px;bottom:6px;right:calc(var(--hz)*-1);width:calc(var(--hz)*2);cursor:ew-resize}
    .wh-rz-w{top:6px;bottom:6px;left:calc(var(--hz)*-1);width:calc(var(--hz)*2);cursor:ew-resize}
    .wh-rz-ne{top:calc(var(--hz)*-1);right:calc(var(--hz)*-1);width:calc(var(--hz)*2.6);height:calc(var(--hz)*2.6);cursor:nesw-resize}
    .wh-rz-nw{top:calc(var(--hz)*-1);left:calc(var(--hz)*-1);width:calc(var(--hz)*2.6);height:calc(var(--hz)*2.6);cursor:nwse-resize}
    .wh-rz-se{bottom:calc(var(--hz)*-1);right:calc(var(--hz)*-1);width:calc(var(--hz)*2.6);height:calc(var(--hz)*2.6);cursor:nwse-resize}
    .wh-rz-sw{bottom:calc(var(--hz)*-1);left:calc(var(--hz)*-1);width:calc(var(--hz)*2.6);height:calc(var(--hz)*2.6);cursor:nesw-resize}
    /* the bottom dock of minimized title-strips (UO-ish) */
    #whDock{position:absolute;left:8px;right:8px;bottom:6px;z-index:9000;
      display:flex;flex-wrap:wrap-reverse;align-items:flex-end;gap:6px;pointer-events:none}
    #whDock .wh-window{position:relative;pointer-events:auto;width:156px;
      box-shadow:0 4px 12px rgba(0,0,0,.5), inset 0 0 0 2px var(--wood)}
    .wh-window.wh-minimized>.wh-body,.wh-window.wh-minimized>.wh-rz{display:none}
    .wh-window.wh-minimized>.wh-titlebar{border-radius:8px;cursor:pointer}
    /* the ☰ hidden-windows menu */
    .wh-menu{position:absolute;z-index:9500;min-width:152px;background:var(--panel-bg);
      border:2px solid var(--wood);border-radius:10px;box-shadow:var(--float-shadow);padding:4px;
      display:flex;flex-direction:column;gap:2px}
    .wh-menu-item{background:transparent;border:none;color:var(--ink);font:inherit;font-size:13px;
      text-align:left;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap}
    .wh-menu-item:hover{background:rgba(230,190,80,.9);color:#241d0e}
    .wh-menu-empty{color:var(--muted);font-size:12px;font-style:italic;padding:7px 12px;white-space:nowrap}
    /* Settings → Windows preset buttons reuse the segmented-button chrome. */

    /* ======================================================================
       R8 — UI kit re-skin (PixelLab wood/parchment nine-slice panels + the
       WildhearthStorybook pixel font). Dual-path: the `--font-title` glyph swap
       and the `.wh-skinned` class are toggled by src/ui/skin.ts ONLY when the
       assets shipped; with no ui PNGs everything below is inert and the
       code-drawn CSS chrome above stands (CLAUDE.md hard rule #1).
       ====================================================================== */
    /* -- pixel font on titles/headings + the primary (menu) buttons. Dense body
          text keeps the readable sans stack. -- */
    .menu-title,.menu-modal-title,.screen-title,.cc-title,.cc-section-head,
    .set-section-title,.shop-section,.wn-title,.q-title,.credits-head,
    .wh-title-text,#tutTitle,.mm-big-title,.choice-card h3,.cc-goal-title,
    #gpTitle,.eod-achieve-head,.book-cat,.help-tab,.book-tab,.q-tab,
    .menu-btn,.mm-big-title{ font-family:var(--font-title) }
    /* the pixel font sits a touch tall — nudge tracking on the big display titles */
    .menu-title,.screen-title,.cc-title{ letter-spacing:.02em }

    /* -- the ornate wood frame on every UTILITY/PANEL window. Excludes the
          permanent chrome (viewport + clock/coins/needs/dock): a 22px wood
          border would dwarf the tiny HUD pills and box the game viewport. The
          interior stays the dark readable --panel-bg (no `fill`), so all the
          inner content keeps its designed contrast; only the border ring is the
          PNG. -- */
    .wh-skinned .wh-window[data-win]:not([data-win="viewport"]):not([data-win="clock"]):not([data-win="coins"]):not([data-win="needs"]):not([data-win="dock"]){
      border-style:solid;
      border-width:20px 18px 22px 18px;
      border-image:var(--skin-window) 34 30 36 30 / auto / 0 stretch;
      background:var(--panel-bg);
      border-radius:9px;
      box-shadow:0 10px 26px rgba(0,0,0,.55);
      image-rendering:pixelated;
    }
    /* the title bar becomes a slim strip sitting just inside the frame's top
       band — transparent (the wood frame shows around it), no rounded corners */
    .wh-skinned .wh-window[data-win]:not([data-win="viewport"]):not([data-win="clock"]):not([data-win="coins"]):not([data-win="needs"]):not([data-win="dock"])>.wh-titlebar{
      background:transparent;box-shadow:none;border-radius:0;height:22px;
      margin:-4px -2px 2px;padding:0 2px 0 4px;
    }
    /* darken + shadow the title so it reads on the medium wood band */
    .wh-skinned .wh-window>.wh-titlebar .wh-title-text{text-shadow:0 1px 1px rgba(0,0,0,.65)}
    .wh-skinned .wh-window>.wh-body{border-radius:0}

    /* -- the full-screen menu modals (char creation, pause, exit, and the
          title-screen back-able screens) share the wood frame so they read as
          one family with the in-game windows. Same no-fill dark interior. -- */
    .wh-skinned .menu-panel,.wh-skinned .screen-panel{
      border-style:solid;border-width:24px 22px 26px 22px;
      border-image:var(--skin-window) 34 30 36 30 / auto / 0 stretch;
      border-radius:14px;image-rendering:pixelated;
    }
    /* minimized strips + the resizable-window inner padding stay as-is; the
       frame's own border already supplies the breathing room */
    .wh-skinned .wh-window[data-win]:not([data-win="viewport"]):not([data-win="clock"]):not([data-win="coins"]):not([data-win="needs"]):not([data-win="dock"]):not(.wh-resizable)>.wh-body{
      padding:2px 3px;
    }

    /* -- interaction prompt: the compact parchment tooltip panel with dark ink -- */
    .wh-skinned #prompt{
      background:transparent;border:0;box-shadow:0 4px 12px rgba(0,0,0,.4);
      border-image:var(--skin-tooltip) 18 fill / 18px stretch;
      color:#4a3418;text-shadow:none;image-rendering:pixelated;
      padding:10px 20px;
    }

    /* -- dialogue portrait notch (R8): a wood-framed bust to the left of the
          line + choices. The <img> src is wired per-NPC by dialoguebox.ts; NPCs
          with no portrait yet get .dlg-noportrait (notch hidden, text reflows
          full-width). Reads fine with or without the panel skin. -- */
    #dialogueBox{display:flex;gap:14px;align-items:flex-start}
    #dlgPortrait{flex:none;width:76px;height:76px;border-radius:8px;
      background:#241a10;border:2px solid var(--wood);
      box-shadow:inset 0 0 0 1px var(--hairline),0 2px 6px rgba(0,0,0,.5);
      image-rendering:pixelated;object-fit:cover;object-position:top center;
      overflow:hidden}
    #dlgMain{flex:1;min-width:0;display:flex;flex-direction:column}
    #dialogueBox.dlg-noportrait #dlgPortrait{display:none}
    .wh-skinned #dlgPortrait{border-color:#6b4f30;
      box-shadow:inset 0 0 0 1px rgba(255,213,79,.4),0 2px 8px rgba(0,0,0,.55)}
  </style>
</head>
<body>
  <div id="gameArea">
    <canvas id="cv"></canvas>
    <div id="prompt"></div>
    <div id="toast"></div>
    <button id="actBtn">✋</button>
    <div id="zoomBtns">
      <button class="zoom-btn" id="zoomIn">＋</button>
      <button class="zoom-btn" id="zoomOut">－</button>
    </div>
    <div id="eodQuick"></div>
    <!-- Guidance Mode: tutorial step bubble, persistent Help icon, aspiration pill -->
    <div id="tutorialBubble">
      <div id="tutTitle"></div>
      <div id="tutBody"></div>
      <div id="tutBtns">
        <button id="tutSkip">Skip Tutorial</button>
        <button id="tutDismiss" title="Dismiss (the Help ? re-shows it)">Got it</button>
      </div>
    </div>
    <button id="helpBtn" title="Show the current tutorial hint">?</button>
    <div id="aspirationPill">
      <span id="aspText"></span>
      <button id="aspClose" title="Dismiss">✕</button>
    </div>
  </div>
  <div id="guidanceScrim"></div>
  <div id="guidancePrompt">
    <div id="gpTitle"></div>
    <div id="gpBtns"></div>
  </div>
  <!-- Dialogue + Day-end-summary content roots (Windows migration II): plain
       content now, wrapped into wm windows by src/ui/dialoguebox.ts /
       src/ui/dayendpanel.ts — chrome (position/background/border/show-hide,
       the NPC's name / "<Season>, Day N" title) lives in .wh-window instead. -->
  <div id="dialogueBox">
    <img id="dlgPortrait" alt="" />
    <div id="dlgMain">
      <div id="dlgText"></div>
      <div id="dlgChoices"></div>
    </div>
  </div>
  <div id="eodPanel">
    <div id="eodBody"></div>
    <div id="eodHint">Enter or Esc to continue</div>
  </div>
  <!-- HUD window bodies (wrapped into windows by src/ui/windows/setup.ts) -->
  <div id="clockWin">
    <canvas id="clockDial"></canvas>
    <div id="hudInfo">
      <div class="pill" id="calendar">—</div>
      <div class="pill" id="weather">—</div>
    </div>
  </div>
  <div id="coinsWin">
    <div class="pill">🪙 <span id="coins">0</span></div>
  </div>
  <div id="minimapBox"><canvas id="minimap"></canvas>
    <div id="travelConfirm">
      <div class="tc-title"></div>
      <div class="tc-fare"></div>
      <div class="tc-btns"><button class="tc-go">Travel</button><button class="tc-no">Cancel</button></div>
    </div></div>
  <div id="backpack">
    <div id="backpackGrid"></div>
  </div>
  <div id="skillsPanel">
    <div id="skillsRep" title="Town Fame — how the whole town regards you (UO-style), apart from any one friendship"></div>
    <div id="skillsTotal"></div>
    <div id="skillsList"></div>
  </div>
  <div id="memoryPanel">
    <div id="bookTabs">
      <button class="book-tab active" id="bookTabCollections">Collections</button>
      <button class="book-tab" id="bookTabMemories">Memories</button>
    </div>
    <div id="bookBody"></div>
  </div>
  <div id="questPanel">
    <div id="questTabs">
      <button class="q-tab active" id="qTabActive">Active</button>
      <button class="q-tab" id="qTabDone">Completed</button>
    </div>
    <div id="questBody"></div>
  </div>
  <div id="shopWindow">
    <div class="shop-head">🪙 <span id="shopCoins">0</span></div>
    <div id="shopCustomers"></div>
    <div class="shop-section" id="shopSellLabel">Sell</div>
    <div id="shopSell"></div>
    <div class="shop-section" id="shopBuyLabel">Buy</div>
    <div id="shopBuy"></div>
  </div>
  <div id="giftChooser">
    <div id="giftList"></div>
  </div>
  <div id="storageWindow">
    <div class="st-cols">
      <div class="st-col">
        <div class="shop-section">In the barn</div>
        <div id="storageGrid" class="st-grid"></div>
      </div>
      <div class="st-col">
