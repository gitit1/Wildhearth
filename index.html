<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
  <title>Wildhearth</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#365b28;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
    canvas{display:block;touch-action:none}
    /* UO-style layout: the play window on the left, a permanent sidebar on the
       right where the map / bag / skills gumps live by default. */
    body{display:flex}
    #gameArea{position:relative;flex:1;height:100%;overflow:hidden}
    #cv{position:absolute;inset:0;width:100%;height:100%}
    #sidebar{width:300px;flex:none;height:100%;position:relative;z-index:4;
      background:repeating-linear-gradient(180deg,rgba(0,0,0,.10) 0 2px,transparent 2px 46px),
        linear-gradient(90deg,#4e3a24,#5d4630 30%,#56402a);
      border-left:4px solid #2f2317;box-shadow:-4px 0 14px rgba(0,0,0,.35)}
    #hud{position:fixed;top:10px;right:10px;width:284px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;z-index:5}
    .pill{background:rgba(25,32,18,.85);color:#f0ead6;padding:7px 14px;border-radius:12px;font-size:15px;font-weight:700}
    #calendar{font-size:13px;white-space:nowrap}
    #weather{font-size:13px;white-space:nowrap}
    #prompt{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);background:rgba(25,32,18,.9);
      color:#ffd54f;padding:8px 16px;border-radius:12px;font-size:15px;font-weight:700;display:none;z-index:5}
    #toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(46,90,38,.95);
      color:#fff;padding:8px 18px;border-radius:12px;font-size:15px;font-weight:700;display:none;z-index:6}
    #actBtn{position:absolute;bottom:18px;left:18px;width:64px;height:64px;border-radius:50%;border:none;
      background:rgba(230,190,80,.9);font-size:26px;z-index:6;cursor:pointer;
      display:flex;align-items:center;justify-content:center}
    #zoomBtns{position:absolute;right:12px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:6}
    .zoom-btn{width:40px;height:40px;border-radius:12px;border:2px solid #7a5c34;cursor:pointer;
      background:rgba(25,32,18,.85);color:#f0ead6;font-size:22px;font-weight:700;line-height:1;
      display:flex;align-items:center;justify-content:center;padding:0}
    #tools{position:fixed;bottom:14px;right:10px;width:284px;display:flex;flex-direction:row;
      justify-content:center;gap:10px;z-index:6}
    .tool-btn{width:52px;height:52px;border-radius:14px;border:2px solid #7a5c34;cursor:pointer;
      background:rgba(25,32,18,.85);color:#f0ead6;font-size:24px;line-height:1;
      display:flex;align-items:center;justify-content:center;padding:0}
    .tool-btn.active{background:rgba(230,190,80,.9);border-color:#b8912f}
    #backpack{--s:1;position:fixed;top:236px;right:14px;display:none;z-index:5;user-select:none;
      background:rgba(25,32,18,.88);border:2px solid #7a5c34;border-radius:14px;
      padding:calc(10px*var(--s)) calc(12px*var(--s));color:#f0ead6}
    #backpack h2{margin:0 0 calc(8px*var(--s));font-size:calc(14px*var(--s));text-align:center}
    #minimapBox{position:fixed;top:88px;right:14px;z-index:5;display:block;border:2px solid #7a5c34;
      border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.4);font-size:0}
    #minimap{border-radius:8px}
    #backpackGrid{display:grid;grid-template-columns:repeat(4,calc(52px*var(--s)));gap:calc(8px*var(--s))}
    .bp-slot{position:relative;width:calc(52px*var(--s));height:calc(52px*var(--s));border-radius:8px;
      background:rgba(240,234,214,.08);border:1px solid rgba(240,234,214,.2);
      display:flex;align-items:center;justify-content:center}
    .bp-qty{position:absolute;bottom:2px;left:4px;font-size:calc(11px*var(--s));font-weight:700;
      color:#ffd54f;text-shadow:0 1px 2px rgba(0,0,0,.8)}
    .panel-grip{position:absolute;right:1px;bottom:1px;width:16px;height:16px;cursor:nwse-resize;
      touch-action:none;background:linear-gradient(135deg,transparent 55%,#a5814f 55%);
      border-radius:0 0 9px 0;opacity:.8;z-index:2}
    #memoryPanel{--s:1;position:fixed;top:120px;right:330px;display:none;z-index:5;user-select:none;
      background:rgba(25,32,18,.92);border:2px solid #7a5c34;border-radius:14px;
      padding:calc(10px*var(--s)) calc(12px*var(--s));color:#f0ead6;min-width:calc(250px*var(--s))}
    #memoryPanel h2{margin:0 0 calc(6px*var(--s));font-size:calc(14px*var(--s));text-align:center}
    #bookTabs{display:flex;gap:calc(6px*var(--s));margin-bottom:calc(8px*var(--s))}
    .book-tab{flex:1;border:1px solid #7a5c34;border-radius:8px;background:rgba(240,234,214,.07);
      color:#cdb98a;font-size:calc(12px*var(--s));font-weight:700;padding:calc(4px*var(--s));cursor:pointer}
    .book-tab.active{background:rgba(230,190,80,.85);color:#2b2313;border-color:#b8912f}
    #bookBody{display:flex;flex-direction:column;gap:calc(5px*var(--s));
      max-height:calc(280px*var(--s));overflow-y:auto;font-size:calc(12px*var(--s))}
    .book-cat{font-weight:700;color:#ffd54f;margin-top:calc(4px*var(--s))}
    .book-grid{display:flex;flex-wrap:wrap;gap:calc(6px*var(--s))}
    .book-item{display:flex;align-items:center;gap:4px;background:rgba(240,234,214,.07);
      border-radius:8px;padding:2px 7px 2px 3px}
    .book-mem{display:flex;flex-direction:column;background:rgba(240,234,214,.07);
      border-radius:8px;padding:calc(4px*var(--s)) calc(7px*var(--s))}
    .book-when{color:#cdb98a;font-size:calc(10px*var(--s));font-weight:700}
    .book-empty{color:#9a8f74;font-style:italic}
    #skillsPanel{--s:1;position:fixed;top:470px;right:14px;display:none;z-index:5;user-select:none;
      background:rgba(25,32,18,.88);border:2px solid #7a5c34;border-radius:14px;
      padding:calc(10px*var(--s)) calc(12px*var(--s));color:#f0ead6;min-width:calc(210px*var(--s))}
    #skillsPanel h2{margin:0 0 calc(4px*var(--s));font-size:calc(14px*var(--s));text-align:center}
    #skillsTotal{text-align:center;font-size:calc(11px*var(--s));color:#cdb98a;font-weight:700;
      margin-bottom:calc(6px*var(--s));font-variant-numeric:tabular-nums}
    #skillsList{display:flex;flex-direction:column;gap:calc(4px*var(--s));
      max-height:calc(150px*var(--s));overflow-y:auto}
    .sk-row{position:relative;display:flex;align-items:center;gap:calc(8px*var(--s));
      padding:calc(4px*var(--s)) calc(6px*var(--s));border-radius:8px;background:rgba(240,234,214,.07)}
    .sk-lock{background:transparent;border:1px solid rgba(240,234,214,.25);border-radius:6px;
      color:#e8c34f;font-size:calc(11px*var(--s));width:calc(24px*var(--s));height:calc(22px*var(--s));
      cursor:pointer;padding:0;line-height:1}
    .sk-name{flex:1;font-size:calc(13px*var(--s));font-weight:700}
    .sk-value{font-size:calc(13px*var(--s));font-weight:700;color:#ffd54f;min-width:calc(36px*var(--s));
      text-align:right;font-variant-numeric:tabular-nums}
    .sk-float{position:absolute;right:calc(40px*var(--s));top:0;pointer-events:none}
    .sk-pop{position:absolute;right:0;color:#9fe36a;font-size:calc(12px*var(--s));font-weight:700;
      text-shadow:0 1px 2px rgba(0,0,0,.8);animation:skpop 1.1s ease-out forwards}
    @keyframes skpop{from{transform:translateY(2px);opacity:1}to{transform:translateY(-16px);opacity:0}}
    #shopWindow{--s:1;position:fixed;top:120px;left:220px;display:none;z-index:7;user-select:none;
      background:rgba(25,32,18,.94);border:2px solid #7a5c34;border-radius:14px;
      padding:calc(10px*var(--s)) calc(14px*var(--s));color:#f0ead6;min-width:calc(320px*var(--s))}
    #shopWindow h2{margin:0 0 calc(6px*var(--s));font-size:calc(15px*var(--s));text-align:center}
    #shopClose{position:absolute;top:6px;right:8px;background:transparent;border:none;color:#f0ead6;
      font-size:calc(15px*var(--s));cursor:pointer;padding:2px 6px}
    /* gift chooser: a small item picker reusing the shop's row/button chrome */
    #giftChooser{--s:1;position:fixed;top:150px;left:260px;display:none;z-index:7;user-select:none;
      background:rgba(25,32,18,.94);border:2px solid #7a5c34;border-radius:14px;
      padding:calc(10px*var(--s)) calc(14px*var(--s));color:#f0ead6;min-width:calc(280px*var(--s))}
    #giftChooser h2{margin:0 0 calc(6px*var(--s));font-size:calc(15px*var(--s));text-align:center}
    #giftClose{position:absolute;top:6px;right:8px;background:transparent;border:none;color:#f0ead6;
      font-size:calc(15px*var(--s));cursor:pointer;padding:2px 6px}
    #giftList{display:flex;flex-direction:column;gap:calc(4px*var(--s));
      max-height:calc(300px*var(--s));overflow-y:auto}
    .shop-head{display:flex;justify-content:center;gap:6px;font-size:calc(13px*var(--s));
      margin-bottom:calc(8px*var(--s));color:#ffd54f;font-weight:700}
    .shop-section{font-size:calc(12px*var(--s));font-weight:700;color:#cdb98a;text-transform:uppercase;
      letter-spacing:.06em;margin:calc(8px*var(--s)) 0 calc(4px*var(--s))}
    .shop-row{display:flex;align-items:center;gap:calc(8px*var(--s));padding:calc(4px*var(--s)) calc(6px*var(--s));
      border-radius:8px;background:rgba(240,234,214,.07);margin-bottom:calc(4px*var(--s))}
    .shop-icon{flex:none;background:rgba(240,234,214,.08);border-radius:6px}
    .shop-name{flex:1;font-size:calc(13px*var(--s));font-weight:700}
    .shop-total{font-size:calc(12px*var(--s));color:#ffd54f;font-variant-numeric:tabular-nums;white-space:nowrap}
    .shop-step{display:flex;align-items:center;gap:4px}
    .shop-step button{width:calc(22px*var(--s));height:calc(22px*var(--s));border-radius:6px;cursor:pointer;
      border:1px solid rgba(240,234,214,.3);background:transparent;color:#f0ead6;
      font-size:calc(13px*var(--s));line-height:1;padding:0}
    .shop-qty{min-width:calc(20px*var(--s));text-align:center;font-size:calc(13px*var(--s));
      font-weight:700;font-variant-numeric:tabular-nums}
    .shop-btn{border:2px solid #b8912f;border-radius:8px;background:rgba(230,190,80,.9);color:#241d0e;
      font-weight:700;font-size:calc(12px*var(--s));padding:calc(4px*var(--s)) calc(10px*var(--s));cursor:pointer}
    .shop-btn:hover{background:#f2cf6b}
    .shop-sellall{display:block;margin:calc(2px*var(--s)) auto 0}
    .shop-empty{font-size:calc(12px*var(--s));opacity:.75;padding:calc(4px*var(--s)) calc(6px*var(--s))}
    #opening{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center}
    #opening.dark{background:rgba(14,18,10,.93)}
    #opening.reveal{background:transparent;pointer-events:none;align-items:flex-end}
    .menu-panel{background:rgba(25,32,18,.96);border:2px solid #7a5c34;border-radius:16px;
      padding:28px 36px;color:#f0ead6;text-align:center;max-width:600px}
    .menu-title{font-size:44px;font-weight:800;letter-spacing:.04em;margin:0 0 4px;color:#ffd54f;
      text-shadow:0 2px 8px rgba(0,0,0,.6)}
    .menu-sub{opacity:.75;margin:6px 0 0;font-size:13px}
    .menu-text{font-size:15px;line-height:1.7;margin:0 0 16px}
    .menu-btn{display:block;width:260px;margin:10px auto 0;padding:12px;border-radius:12px;
      border:2px solid #b8912f;background:rgba(230,190,80,.92);color:#241d0e;font-weight:800;
      font-size:16px;cursor:pointer}
    .menu-btn:hover{background:#f2cf6b}
    /* ============ UI design pass: one chrome language for everything ============
       Tokens first, then grouped overrides that win the cascade. Wood border,
       deep green-black gradient panels, a gold hairline inset, soft drop
       shadows under everything that floats. */
    :root{
      --ink:#f0ead6; --gold:#ffd54f; --gold-soft:#e8c34f; --muted:#cdb98a;
      --wood:#7a5c34; --wood-dark:#5d4630;
      --panel-bg:linear-gradient(180deg,rgba(34,42,25,.95),rgba(20,26,14,.95));
      --hairline:rgba(232,195,79,.28);
      --cell-bg:rgba(240,234,214,.07); --cell-edge:rgba(240,234,214,.16);
      --r:14px; --r-s:9px;
      --float-shadow:0 8px 22px rgba(0,0,0,.55),inset 0 0 0 1px var(--hairline);
      --pill-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 0 0 1px var(--hairline);
    }
    /* floating windows share one chrome */
    #backpack,#skillsPanel,#memoryPanel,#shopWindow,#giftChooser{
      background:var(--panel-bg);border:2px solid var(--wood);border-radius:var(--r);
      box-shadow:var(--float-shadow)}
    #backpack h2,#skillsPanel h2,#memoryPanel h2,#shopWindow h2,#giftChooser h2{
      color:var(--gold);letter-spacing:.05em;
      border-bottom:1px solid var(--hairline);padding-bottom:calc(5px*var(--s))}
    #minimapBox{border:2px solid var(--wood);border-radius:12px;box-shadow:var(--float-shadow)}
    /* pills, prompt, toast: same outlined rounded treatment */
    .pill{background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow)}
    #prompt{background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);color:var(--gold)}
    #toast{background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);color:#cfe8b0}
    /* buttons: one family */
    .tool-btn,.zoom-btn{background:var(--panel-bg);border:2px solid var(--wood);
      border-radius:12px;box-shadow:var(--pill-shadow);transition:border-color .12s,transform .06s}
    .tool-btn:hover,.zoom-btn:hover{border-color:var(--gold-soft)}
    .tool-btn:active,.zoom-btn:active{transform:translateY(1px)}
    .tool-btn.active{background:rgba(230,190,80,.92);border-color:#b8912f;box-shadow:var(--pill-shadow)}
    #actBtn{border:2px solid #b8912f;box-shadow:0 5px 14px rgba(0,0,0,.45)}
    /* item cells / rows: consistent outline */
    .bp-slot,.shop-row,.sk-row,.book-item,.book-mem,.shop-icon,.book-tab{
      background:var(--cell-bg);border:1px solid var(--cell-edge)}
    .book-tab.active{background:rgba(230,190,80,.88);border-color:#b8912f}
    .menu-panel{box-shadow:var(--float-shadow)}
    /* the HUD: clock dial + info column */
    #hud{align-items:center;gap:8px;flex-wrap:nowrap;justify-content:flex-start;padding-left:6px}
    #clockDial{width:64px;height:64px;flex:none;border-radius:50%;
      border:2px solid var(--wood);box-shadow:var(--pill-shadow);background:#1d2440}
    #hudInfo{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
    #hudInfo .pill{padding:3px 10px;font-size:12px}
    .choice-row{display:flex;gap:14px;justify-content:center;margin:6px 0 4px}
    .choice-card{width:160px;background:rgba(240,234,214,.07);border:2px solid rgba(240,234,214,.25);
      border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center}
    .choice-card:hover{border-color:#e8c34f;background:rgba(230,190,80,.15)}
    .choice-card h3{margin:8px 0 6px;font-size:15px;color:#ffd54f}
    .choice-card p{margin:0;font-size:12px;opacity:.8;line-height:1.45}
    .choice-card.sel{border-color:#e8c34f;background:rgba(230,190,80,.22);
      box-shadow:0 0 0 1px #e8c34f inset}
    .choice-card .cc-note{margin-top:6px;color:#ffd54f;opacity:.95;font-weight:700;font-size:11px}
    /* ============ Character Creation + Path/Goal screens ============ */
    .cc-panel{max-width:760px;width:min(760px,calc(100vw - 24px));
      max-height:92vh;overflow-y:auto;text-align:left}
    .cc-title{font-size:30px;text-align:center;margin-bottom:12px}
    .cc-body{display:flex;gap:22px;align-items:flex-start}
    .cc-left{flex:none}
    .cc-preview{background:radial-gradient(ellipse at 50% 42%,rgba(90,120,70,.35),rgba(14,18,10,.55));
      border:2px solid var(--wood);border-radius:12px;box-shadow:var(--pill-shadow)}
    .cc-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:11px}
    .cc-field{display:flex;flex-direction:column;gap:5px}
    .cc-field.cc-inline{flex-direction:row;align-items:center;gap:12px}
    .cc-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .cc-names{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
    .cc-input{flex:1;min-width:96px;background:var(--cell-bg);border:1px solid var(--cell-edge);
      border-radius:8px;color:var(--ink);font:inherit;font-size:14px;padding:8px 10px}
    .cc-input:focus{outline:none;border-color:var(--gold-soft)}
    .cc-dice{flex:none;width:40px;height:38px;border-radius:9px;border:2px solid var(--wood);
      background:var(--panel-bg);color:var(--ink);font-size:19px;cursor:pointer;line-height:1;box-shadow:var(--pill-shadow)}
    .cc-dice:hover{border-color:var(--gold-soft)}
    .cc-stepper{display:flex;align-items:center;gap:8px}
    .cc-step{width:30px;height:30px;border-radius:8px;border:1px solid var(--cell-edge);
      background:var(--cell-bg);color:var(--ink);font-size:18px;font-weight:700;cursor:pointer;line-height:1;padding:0}
    .cc-step:hover{border-color:var(--gold-soft)}
    .cc-age-val{min-width:34px;text-align:center;font-size:16px;font-weight:800;color:var(--gold);
      font-variant-numeric:tabular-nums}
    .cc-toggle,.cc-row{display:flex;gap:6px}
    .cc-row.cc-wrap{flex-wrap:wrap}
    .cc-btn{background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:8px;
      color:var(--ink);font:inherit;font-size:13px;font-weight:700;padding:6px 12px;cursor:pointer}
    .cc-btn:hover{border-color:var(--gold-soft)}
    .cc-btn.sel{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    .cc-swatch{width:30px;height:30px;border-radius:8px;border:2px solid rgba(240,234,214,.25);
      cursor:pointer;padding:0}
    .cc-swatch:hover{border-color:var(--gold-soft)}
    .cc-swatch.sel{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,213,79,.5)}
    .cc-outfit{width:36px;height:30px}
    .cc-continue{margin-top:16px}
    .cc-section-head{font-size:14px;font-weight:800;color:var(--gold);letter-spacing:.04em;
      text-align:center;margin:14px 0 4px;text-transform:uppercase}
    .goal-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:2px 0}
    .cc-goal{display:flex;flex-direction:column;gap:2px;text-align:left;width:138px;
      background:var(--cell-bg);border:2px solid var(--cell-edge);border-radius:10px;
      color:var(--ink);font:inherit;padding:8px 10px;cursor:pointer}
    .cc-goal:hover{border-color:var(--gold-soft)}
    .cc-goal.sel{border-color:var(--gold);background:rgba(230,190,80,.18)}
    .cc-goal-title{font-size:14px;font-weight:800;color:var(--gold)}
    .cc-goal-blurb{font-size:11px;opacity:.82;line-height:1.35}
    .reveal-bar{pointer-events:auto;margin-bottom:56px;background:rgba(25,32,18,.92);
      border:2px solid #7a5c34;border-radius:14px;padding:16px 24px;text-align:center;max-width:600px;
      color:#f0ead6}
    .ctxmenu{position:fixed;z-index:8;min-width:130px;background:rgba(25,32,18,.96);
      border:2px solid #7a5c34;border-radius:10px;padding:4px;box-shadow:0 4px 14px rgba(0,0,0,.5);
      display:flex;flex-direction:column;gap:2px}
    .ctx-item{background:transparent;border:none;color:#f0ead6;font:inherit;font-size:14px;
      text-align:left;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap}
    .ctx-item:hover{background:rgba(230,190,80,.9);color:#241d0e}
    /* the always-visible needs strip: top-left of the play window, wood/gold chrome */
    #needsStrip{position:fixed;top:10px;left:10px;z-index:5;border-radius:12px;
      background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);
      padding:2px}
    /* fade-to-black overlay for sleep / collapse time skips */
    #fade{position:fixed;inset:0;z-index:20;background:#000;opacity:0;pointer-events:none;
      display:flex;align-items:center;justify-content:center;color:var(--gold);
      font-size:20px;font-weight:800;letter-spacing:.04em;text-shadow:0 2px 8px rgba(0,0,0,.7)}
    /* the dialogue bottom-box: docked bottom-centre of the play window, wood/gold
       chrome, NPC name header + line + numbered choice buttons (auto-pauses time) */
    #dialogueBox{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
      width:min(680px,calc(100% - 32px));display:none;z-index:7;color:var(--ink);
      background:var(--panel-bg);border:2px solid var(--wood);border-radius:var(--r);
      box-shadow:var(--float-shadow);padding:12px 16px}
    #dlgName{color:var(--gold);font-weight:800;font-size:16px;letter-spacing:.04em;
      border-bottom:1px solid var(--hairline);padding-bottom:6px;margin-bottom:8px}
    #dlgText{font-size:15px;line-height:1.5;min-height:42px;margin-bottom:10px}
    #dlgChoices{display:flex;flex-direction:column;gap:6px}
    .dlg-choice{display:flex;gap:10px;align-items:center;text-align:left;width:100%;
      background:var(--cell-bg);border:1px solid var(--cell-edge);border-radius:var(--r-s);
      color:var(--ink);font:inherit;font-size:14px;padding:8px 12px;cursor:pointer}
    .dlg-choice:hover{border-color:var(--gold-soft);background:rgba(230,190,80,.14)}
    .dlg-key{flex:none;width:20px;height:20px;border-radius:6px;background:rgba(232,195,79,.18);
      color:var(--gold);font-weight:800;font-size:12px;display:flex;align-items:center;
      justify-content:center;font-variant-numeric:tabular-nums}
    /* End-of-day summary (Part A #7): a "quick" 3-line toast-style pill that
       auto-fades, and a "full" wood/gold modal (dismiss by click/Esc/Enter,
       pauses game-time — same gating the dialogue box uses). */
    #eodQuick{position:absolute;top:60px;left:50%;transform:translateX(-50%);display:none;
      background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);
      color:var(--ink);padding:10px 18px;border-radius:12px;font-size:13px;line-height:1.6;
      font-weight:700;text-align:center;z-index:6;white-space:nowrap;transition:opacity .3s linear}
    #eodScrim{position:fixed;inset:0;z-index:10;display:none;background:rgba(10,12,8,.55)}
    #eodPanel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:11;
      background:var(--panel-bg);border:2px solid var(--wood);border-radius:var(--r);
      box-shadow:var(--float-shadow);color:var(--ink);padding:18px 26px;min-width:300px;
      max-width:min(420px,calc(100vw - 40px));max-height:min(560px,calc(100vh - 40px));
      overflow-y:auto;cursor:pointer}
    #eodTitle{color:var(--gold);font-size:18px;font-weight:800;letter-spacing:.04em;
      text-align:center;margin:0 0 10px;border-bottom:1px solid var(--hairline);padding-bottom:8px}
    .eod-row{font-size:14px;padding:3px 0}
    .eod-achieve-head{color:var(--gold);font-weight:700;font-size:13px;margin:10px 0 2px;
      border-top:1px solid var(--hairline);padding-top:8px;text-transform:uppercase;letter-spacing:.05em}
    #eodHint{text-align:center;color:var(--muted);font-size:12px;margin-top:12px;font-style:italic}
    /* ===== Guidance Mode (Part A #5) ===== */
    /* Tutorial step bubble — a transparent panel, top-centre of the play area,
       shown while game-time is paused for the step (DECISIONS). */
    #tutorialBubble{position:absolute;top:96px;left:50%;transform:translateX(-50%);
      width:min(360px,calc(100% - 40px));display:none;z-index:7;color:var(--ink);
      background:linear-gradient(180deg,rgba(34,42,25,.82),rgba(20,26,14,.82));
      border:2px solid var(--wood);border-radius:var(--r);box-shadow:var(--float-shadow);
      padding:12px 16px;backdrop-filter:blur(1.5px)}
    #tutTitle{color:var(--gold);font-weight:800;font-size:15px;letter-spacing:.03em;margin-bottom:6px}
    #tutBody{font-size:14px;line-height:1.5;margin-bottom:10px}
    #tutBtns{display:flex;gap:8px;justify-content:flex-end}
    #tutSkip,#tutDismiss{border-radius:8px;font:inherit;font-size:12px;font-weight:700;
      padding:6px 12px;cursor:pointer;border:1px solid var(--cell-edge);background:var(--cell-bg);color:var(--ink)}
    #tutDismiss{background:rgba(230,190,80,.9);color:#241d0e;border-color:#b8912f}
    #tutSkip:hover,#tutDismiss:hover{border-color:var(--gold-soft)}
    /* persistent Help (?) icon — visible whenever the Tutorial is active */
    #helpBtn{position:absolute;top:96px;right:14px;width:40px;height:40px;border-radius:50%;
      display:none;align-items:center;justify-content:center;z-index:7;cursor:pointer;
      border:2px solid #b8912f;background:rgba(230,190,80,.92);color:#241d0e;
      font-size:22px;font-weight:800;line-height:1;box-shadow:var(--pill-shadow)}
    /* Aspiration objective pill — small, dismissible, non-blocking */
    #aspirationPill{position:absolute;top:98px;left:50%;transform:translateX(-50%);
      display:none;align-items:center;gap:8px;z-index:6;max-width:min(440px,calc(100% - 40px));
      background:var(--panel-bg);border:1.5px solid var(--wood);box-shadow:var(--pill-shadow);
      color:var(--ink);padding:6px 8px 6px 14px;border-radius:12px;font-size:13px;font-weight:700}
    #aspText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #aspClose{flex:none;background:transparent;border:none;color:var(--muted);font-size:13px;
      cursor:pointer;padding:2px 4px;line-height:1}
    #aspClose:hover{color:var(--ink)}
    /* shared guidance modal (Continue-Tutorial on load / Skip-Tutorial confirm) */
    #guidanceScrim{position:fixed;inset:0;z-index:12;display:none;background:rgba(10,12,8,.6)}
    #guidancePrompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);display:none;z-index:13;
      background:var(--panel-bg);border:2px solid var(--wood);border-radius:var(--r);
      box-shadow:var(--float-shadow);color:var(--ink);padding:22px 28px;text-align:center;
      max-width:min(420px,calc(100vw - 40px))}
    #gpTitle{font-size:16px;line-height:1.55;font-weight:700;margin-bottom:8px}
    #gpBtns{display:flex;flex-direction:column;align-items:center}
    #gpBtns .menu-btn{width:280px}
  </style>
</head>
<body>
  <div id="gameArea">
    <canvas id="cv"></canvas>
    <div id="prompt"></div>
    <div id="toast"></div>
    <button id="actBtn">✋</button>
    <div id="zoomBtns">
      <button class="zoom-btn" id="zoomIn">＋</button>
      <button class="zoom-btn" id="zoomOut">－</button>
    </div>
    <div id="dialogueBox">
      <div id="dlgName"></div>
      <div id="dlgText"></div>
      <div id="dlgChoices"></div>
    </div>
    <div id="eodQuick"></div>
    <!-- Guidance Mode: tutorial step bubble, persistent Help icon, aspiration pill -->
    <div id="tutorialBubble">
      <div id="tutTitle"></div>
      <div id="tutBody"></div>
      <div id="tutBtns">
        <button id="tutSkip">Skip Tutorial</button>
        <button id="tutDismiss" title="Dismiss (the Help ? re-shows it)">Got it</button>
      </div>
    </div>
    <button id="helpBtn" title="Show the current tutorial hint">?</button>
    <div id="aspirationPill">
      <span id="aspText"></span>
      <button id="aspClose" title="Dismiss">✕</button>
    </div>
  </div>
  <div id="guidanceScrim"></div>
  <div id="guidancePrompt">
    <div id="gpTitle"></div>
    <div id="gpBtns"></div>
  </div>
  <div id="eodScrim"></div>
  <div id="eodPanel">
    <div id="eodTitle"></div>
    <div id="eodBody"></div>
    <div id="eodHint">Click, Enter, or Esc to continue</div>
  </div>
  <div id="sidebar"></div>
  <div id="hud">
    <canvas id="clockDial"></canvas>
    <div id="hudInfo">
      <div class="pill">🪙 <span id="coins">0</span></div>
      <div class="pill" id="calendar">—</div>
      <div class="pill" id="weather">—</div>
    </div>
  </div>
  <div id="minimapBox"><canvas id="minimap"></canvas></div>
  <div id="backpack">
    <h2>🎒 Backpack</h2>
    <div id="backpackGrid"></div>
  </div>
  <div id="skillsPanel">
    <h2>📜 Skills</h2>
    <div id="skillsTotal"></div>
    <div id="skillsList"></div>
  </div>
  <div id="memoryPanel">
    <h2>📖 Memory Book</h2>
    <div id="bookTabs">
      <button class="book-tab active" id="bookTabCollections">Collections</button>
      <button class="book-tab" id="bookTabMemories">Memories</button>
    </div>
    <div id="bookBody"></div>
  </div>
  <div id="shopWindow">
    <h2 id="shopTitle">🛒 Market stall</h2>
    <button id="shopClose" title="Close (Esc)">✕</button>
    <div class="shop-head">🪙 <span id="shopCoins">0</span></div>
    <div class="shop-section">Sell</div>
    <div id="shopSell"></div>
    <div class="shop-section" id="shopBuyLabel">Buy</div>
    <div id="shopBuy"></div>
  </div>
  <div id="giftChooser">
    <h2>🎁 <span id="giftTitle">Give a gift</span></h2>
    <button id="giftClose" title="Close (Esc)">✕</button>
    <div id="giftList"></div>
  </div>
  <div id="tools">
    <button class="tool-btn" id="mapBtn" title="Map (M)">🗺️</button>
    <button class="tool-btn" id="skillsBtn" title="Skills (K)">📜</button>
    <button class="tool-btn" id="bookBtn" title="Memory Book (B)">📖</button>
    <button class="tool-btn" id="bagBtn" title="Backpack (I)">🎒</button>
    <button class="tool-btn" id="saveBtn" title="Save game">💾</button>
  </div>
  <canvas id="needsStrip"></canvas>
  <div id="fade"></div>
  <div id="opening"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
